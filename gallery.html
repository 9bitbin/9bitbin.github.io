<!DOCTYPE html>
<html>

<head>
    <title>Blooming Flower</title>
    <style>
        #flower {
            width: 100px;
            height: 100px;
            transition: all 2s;
        }
    </style>
</head>

<body>

    <img id="flower" src="flower.png" alt="Flower">
    <button onclick="bloomFlower()">Bloom Flower</button>

    <script>
        function bloomFlower() {
            var flower = document.getElementById("flower");
            flower.style.width = "900px";
            flower.style.height = "900px";
        }
    </script>

</body>

</html>
